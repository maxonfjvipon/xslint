---
name: xcop
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  xcop:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install xcop -v 0.11.0
      - run: >-
          xcop --license LICENSE.txt
          --include '**/*.xsl' --include '**/*.xml'
          --exclude 'test/resources/malformed/**'
