---
name: mutation
'on':
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true
jobs:
  mutation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx stryker run
