    <xsl:template match="/objects/o/o[1]/o[2]">
      <xsl:if test="position() == 1">
        <xsl:text>foo</xsl:text>
      </xsl:if>
      <xsl:copy-of select="$qw"/>
    </xsl:template>
    <xsl:template match="/objects/o/o[1]/o[3]">
      <xsl:if test="position() == 1">
        <xsl:text>foo</xsl:text>
      </xsl:if>
      <xsl:copy-of select="$qw"/>
    </xsl:template>
    <xsl:template match="/objects/o/o[2]">
