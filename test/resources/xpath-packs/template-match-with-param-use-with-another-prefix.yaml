---
pack: template-match-with-param-use-in-invalid-parent-node
found:
  amount: 0
  positions: [ ]
input: |-
  <?xml version="1.0"?>
  <xslt:stylesheet xmlns:xslt="http://www.w3.org/1999/XSL/Transform" xmlns:xs="http://www.w3.org/2001/XMLSchema" version="2.0" id="style1">
    <xslt:output encoding="UTF-8" method="xml"/>
    <xslt:import href="info.xsl"/>
    <xslt:template name="writer">
      <xslt:param name="surname"/>
      <p>
        <xslt:value-of select="$surname"/>
      </p>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[2]">
      <xslt:call-template name="writer">
        <xslt:with-param name="surname" select="'Shakespeare'"/>
      </xslt:call-template>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[3]">
      <xslt:apply-templates select="o/o">
        <xslt:with-param name="surname" select="'Austen'"/>
      </xslt:apply-templates>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[4]">
      <xslt:apply-imports>
        <xslt:with-param name="surname" select="'Dickens'"/>
      </xslt:apply-imports>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[5]">
      <xslt:next-match>
        <xslt:with-param name="surname" select="'Carroll'"/>
      </xslt:next-match>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[6]">
      <xslt:variable name="qw" as="xs:string" select="'ooo'"/>
      <xslt:copy-of select="$qw"/>
    </xslt:template>
    <xslt:template match="/objects/o/o[1]/o[7]">
      <xslt:iterate select="1 to 17">
        <xslt:param name="number" select="1"/>
        <xslt:message>
          <xslt:value-of select="$number"/>
        </xslt:message>
        <xslt:next-iteration>
          <xslt:with-param name="number" select="$number + 1"/>
        </xslt:next-iteration>
      </xslt:iterate>
    </xslt:template>
  </xslt:stylesheet>