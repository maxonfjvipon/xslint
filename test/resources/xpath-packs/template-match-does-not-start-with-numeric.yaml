---
pack: template-match-name-starts-with-numeric
found:
  amount: 0
  positions: [ ]
input: |-
  <?xml version="1.0"?>
  <xsl:stylesheet xmlns:xsl="http://www.w3.org/1999/XSL/Transform" xmlns:xs="http://www.w3.org/2001/XMLSchema" version="2.0" id="style1">
    <xsl:output encoding="UTF-8" method="xml"/>
    <xsl:function name="my:factorial" as="xs:integer">
      <xsl:param name="number" as="xs:integer"/>
      <xsl:sequence
        select="if ($number=0) then 1 else $number * my:factorial($number-1)"/>
    </xsl:function>
    <xsl:template name="ooo">
      <xsl:variable name="qw" as="xs:string" select="ooo" />
      <xsl:copy-of select="$qw"/>
    </xsl:template>
    <xsl:template match='o'>
      <xsl:call-template name='ooo'>
        <xsl:with-param name='oooo'>bold</xsl:with-param>
      </xsl:call-template>
    </xsl:template>
  </xsl:stylesheet>
