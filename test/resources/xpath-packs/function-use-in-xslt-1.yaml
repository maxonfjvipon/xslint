input: |-
  <?xml version="1.0"?>
  <xsl:stylesheet xmlns:xsl="http://www.w3.org/1999/XSL/Transform" version="1.0" id="style1">
    <xsl:output encoding="UTF-8" method="xml"/>
    <xsl:function name="my:factorial" >
      <xsl:param name="number" />
      <xsl:sequence
        select="if ($number=0) then 1 else $number * my:factorial($number-1)"/>
    </xsl:function>
    <xsl:template match="/objects/o/o[1]/o[1]">
      <xsl:copy-of select="my:factorial(3)"/>
    </xsl:template>
  </xsl:stylesheet>
