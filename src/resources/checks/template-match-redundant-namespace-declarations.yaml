---
xpath: /xsl:stylesheet[some $prefix in xslint:in-scope-prefixes(.)[. != 'xml'] satisfies not(descendant-or-self::*[starts-with(name(), concat($prefix, ':'))] or descendant-or-self::*/@*[starts-with(name(), concat($prefix, ':')) or contains(., concat($prefix, ':'))])]
severity: warning
message: The xsl:stylesheet declares a namespace prefix that is never used. Remove the redundant xmlns declaration.
