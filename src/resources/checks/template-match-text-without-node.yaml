---
xpath: //*[count(text()[normalize-space()])>0 and (not(name() = 'xsl:text') and (not((name() = 'xsl:variable' or name() = 'xsl:param' or name() = 'xsl:with-param') and not(@select))))]
severity: error
message: The stylesheet has no xsl:template elements and produces no output. Add at least one template.
